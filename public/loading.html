<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imagginary</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-app-region: drag;
    }

    .wordmark {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 8px;
      color: #d4a843;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 11px;
      color: #555;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .status {
      font-size: 12px;
      color: #666;
      height: 18px;
      margin-bottom: 10px;
      transition: opacity 0.2s;
    }

    .track {
      width: 220px;
      height: 2px;
      background: #1e1e1e;
      border-radius: 1px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      background: #d4a843;
      border-radius: 1px;
      width: 0%;
      transition: width 0.4s ease;
    }

    .version {
      position: absolute;
      bottom: 20px;
      font-size: 10px;
      color: #333;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="wordmark">IMAGGINARY</div>
  <div class="tagline">AI Storyboard Generator</div>
  <div class="status" id="status">Starting…</div>
  <div class="track">
    <div class="bar" id="bar"></div>
  </div>
  <div class="version">v1.0</div>

  <script>
    // nodeIntegration: true — can require electron directly
    const { ipcRenderer } = require('electron');

    const statusEl = document.getElementById('status');
    const barEl    = document.getElementById('bar');

    ipcRenderer.on('loading-update', (_event, { status, progress }) => {
      statusEl.textContent = status;
      barEl.style.width = Math.min(100, Math.max(0, progress)) + '%';
    });

    // Kick off the bar at 2% immediately so it doesn't look frozen
    setTimeout(() => {
      barEl.style.width = '2%';
    }, 100);
  </script>
</body>
</html>
