<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imagginary</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-app-region: drag;
    }

    .wordmark {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 8px;
      color: #d4a843;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 11px;
      color: #555;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 24px;
      width: 220px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #333;
      transition: color 0.3s;
    }

    .step.active {
      color: #d4a843;
    }

    .step.done {
      color: #4a4a4a;
    }

    .step-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #222;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .step.active .step-dot {
      background: #d4a843;
      box-shadow: 0 0 4px #d4a84360;
    }

    .step.done .step-dot {
      background: #3a3a3a;
    }

    .status {
      font-size: 11px;
      color: #555;
      height: 16px;
      margin-bottom: 8px;
      transition: opacity 0.2s;
      width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .track {
      width: 220px;
      height: 2px;
      background: #1e1e1e;
      border-radius: 1px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      background: #d4a843;
      border-radius: 1px;
      width: 0%;
      transition: width 0.4s ease;
    }

    .version {
      position: absolute;
      bottom: 20px;
      font-size: 10px;
      color: #333;
      letter-spacing: 1px;
    }

    .error-block {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      width: 220px;
    }

    .error-block.visible {
      display: flex;
    }

    .error-msg {
      font-size: 11px;
      color: #c0392b;
      text-align: center;
      line-height: 1.5;
    }

    .retry-btn {
      -webkit-app-region: no-drag;
      padding: 7px 22px;
      background: #d4a843;
      color: #0a0a0a;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }

    .retry-btn:hover {
      background: #e0b855;
    }
  </style>
</head>
<body>
  <svg width="260" viewBox="0 0 680 134" role="img" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:20px">
    <g transform="translate(290, 2) scale(2)">
      <rect x="14" y="14" width="28" height="22" rx="2" fill="none" stroke="#ceaf82" stroke-width="1.5" opacity="0.45"/>
      <rect x="11" y="17" width="4" height="3" rx="0.75" fill="#ceaf82" opacity="0.3"/>
      <rect x="11" y="22" width="4" height="3" rx="0.75" fill="#ceaf82" opacity="0.3"/>
      <rect x="11" y="27" width="4" height="3" rx="0.75" fill="#ceaf82" opacity="0.3"/>
      <rect x="6" y="6" width="28" height="22" rx="2" fill="#080808"/>
      <rect x="6" y="6" width="28" height="22" rx="2" fill="none" stroke="#ceaf82" stroke-width="1.8"/>
      <rect x="3" y="9" width="4" height="3" rx="0.75" fill="#ceaf82" opacity="0.7"/>
      <rect x="3" y="14" width="4" height="3" rx="0.75" fill="#ceaf82" opacity="0.7"/>
      <rect x="3" y="19" width="4" height="3" rx="0.75" fill="#ceaf82" opacity="0.7"/>
      <rect x="33" y="9" width="4" height="3" rx="0.75" fill="#ceaf82" opacity="0.7"/>
      <rect x="33" y="14" width="4" height="3" rx="0.75" fill="#ceaf82" opacity="0.7"/>
      <rect x="33" y="19" width="4" height="3" rx="0.75" fill="#ceaf82" opacity="0.7"/>
      <line x1="10" y1="21" x2="30" y2="21" stroke="#ceaf82" stroke-width="0.75" opacity="0.35"/>
      <circle cx="22" cy="15" r="2" fill="#ceaf82" opacity="0.4"/>
    </g>
    <text x="340" y="120" font-family="Impact,'Arial Black',sans-serif" font-size="52" letter-spacing="2" fill="#f5f0e8" text-anchor="middle"><tspan fill="#f5f0e8">IMAGG</tspan><tspan fill="#ceaf82">I</tspan><tspan fill="#f5f0e8">NARY</tspan></text>
  </svg>
  <div class="tagline">AI Storyboard Generator</div>

  <div class="steps">
    <div class="step" id="step-1"><div class="step-dot"></div>Starting Ollama</div>
    <div class="step" id="step-2"><div class="step-dot"></div>Downloading AI model</div>
    <div class="step" id="step-3"><div class="step-dot"></div>Setting up ComfyUI</div>
    <div class="step" id="step-4"><div class="step-dot"></div>Downloading DreamShaper 8</div>
    <div class="step" id="step-5"><div class="step-dot"></div>Opening Imagginary</div>
  </div>

  <div class="status" id="status">Starting…</div>
  <div class="track">
    <div class="bar" id="bar"></div>
  </div>
  <div class="error-block" id="error-block">
    <div class="error-msg" id="error-msg"></div>
    <button class="retry-btn" id="retry-btn">Retry</button>
  </div>

  <div class="version">v1.0</div>

  <script>
    const { ipcRenderer } = require('electron');

    const statusEl = document.getElementById('status');
    const barEl    = document.getElementById('bar');

    // progress → step index (1-based)
    function progressToStep(p) {
      if (p < 20)  return 1;
      if (p < 55)  return 2;
      if (p < 72)  return 3;
      if (p < 95)  return 4;
      return 5;
    }

    function updateSteps(progress) {
      const active = progressToStep(progress);
      for (let i = 1; i <= 5; i++) {
        const el = document.getElementById('step-' + i);
        el.className = 'step' + (i === active ? ' active' : i < active ? ' done' : '');
      }
    }

    const errorBlock = document.getElementById('error-block');
    const errorMsg   = document.getElementById('error-msg');
    const retryBtn   = document.getElementById('retry-btn');

    ipcRenderer.on('loading-update', (_event, { status, progress }) => {
      statusEl.textContent = status;
      barEl.style.width = Math.min(100, Math.max(0, progress)) + '%';
      updateSteps(progress);
    });

    ipcRenderer.on('show-retry-button', (_event, message) => {
      errorMsg.textContent = message || 'Model download failed. Please retry.';
      errorBlock.classList.add('visible');
    });

    ipcRenderer.on('hide-retry-button', () => {
      errorBlock.classList.remove('visible');
      errorMsg.textContent = '';
    });

    retryBtn.addEventListener('click', () => {
      errorBlock.classList.remove('visible');
      ipcRenderer.send('retry-model-pull');
    });

    // Kick off bar and first step immediately
    setTimeout(() => {
      barEl.style.width = '2%';
      updateSteps(2);
    }, 100);
  </script>
</body>
</html>
