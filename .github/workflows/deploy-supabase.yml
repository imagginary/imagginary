name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy dodo-webhook --project-ref oviyvdauhehjsgusnfbd --no-verify-jwt
          supabase functions deploy submit-generation --project-ref oviyvdauhehjsgusnfbd --no-verify-jwt
          supabase functions deploy deduct-credits --project-ref oviyvdauhehjsgusnfbd --no-verify-jwt
          supabase functions deploy get-balance --project-ref oviyvdauhehjsgusnfbd --no-verify-jwt
          supabase functions deploy provision-user --project-ref oviyvdauhehjsgusnfbd --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set Edge Function secrets
        run: |
          supabase secrets set FAL_API_KEY="${{ secrets.FAL_API_KEY }}" --project-ref oviyvdauhehjsgusnfbd
          supabase secrets set SUPABASE_URL="${{ secrets.SUPABASE_URL }}" --project-ref oviyvdauhehjsgusnfbd
          supabase secrets set SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" --project-ref oviyvdauhehjsgusnfbd
          supabase secrets set DODO_WEBHOOK_SECRET="${{ secrets.DODO_WEBHOOK_SECRET }}" --project-ref oviyvdauhehjsgusnfbd
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
