name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14  # Apple Silicon runner
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create placeholder Ollama binary dirs
        run: mkdir -p resources/ollama/mac resources/ollama/win resources/bin

      - name: Download ffmpeg (arm64)
        run: |
          curl -fsSL "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o /tmp/ffmpeg-mac.zip
          unzip -o /tmp/ffmpeg-mac.zip -d resources/bin/
          mv resources/bin/ffmpeg resources/bin/ffmpeg-mac
          chmod +x resources/bin/ffmpeg-mac

      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$APPLE_CERTIFICATE" | base64 --decode > $CERTIFICATE_PATH
          security create-keychain -p "temp-password" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "temp-password" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "temp-password" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEYCHAIN: ${{ runner.temp }}/app-signing.keychain-db
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: npm run dist

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
          draft: false
          prerelease: false

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download ffmpeg (win64)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "$env:TEMP\ffmpeg-win.zip"
          Expand-Archive "$env:TEMP\ffmpeg-win.zip" -DestinationPath "$env:TEMP\ffmpeg-win"
          $ffmpegExe = Get-ChildItem -Recurse "$env:TEMP\ffmpeg-win" -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName "resources\bin\ffmpeg-win.exe"

      - name: Build NSIS installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build deps
        run: sudo apt-get install -y rpm fuse libfuse2

      - name: Download ffmpeg (linux amd64)
        run: |
          curl -fsSL "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" -o /tmp/ffmpeg-linux.tar.xz
          tar -xf /tmp/ffmpeg-linux.tar.xz -C /tmp/
          cp /tmp/ffmpeg-*-amd64-static/ffmpeg resources/bin/ffmpeg-linux
          chmod +x resources/bin/ffmpeg-linux

      - name: Build AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.AppImage
